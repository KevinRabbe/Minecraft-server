name: Build

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '9.6.1'

      - name: Build
        id: gradle-build
        shell: bash
        run: |
          set +e
          gradle clean build --no-daemon > build.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "Gradle build failed. Last 140 log lines:"
            tail -n 140 build.log
            exit "$status"
          fi
          tail -n 40 build.log

      - name: Report Gradle failure on PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          {
            echo '<!-- gradle-build-failure -->'
            echo '### Gradle build failure'
            echo
            echo '```text'
            tail -n 100 build.log
            echo '```'
          } > gradle-failure.md
          gh pr comment "$PR_NUMBER" --body-file gradle-failure.md
