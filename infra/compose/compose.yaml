services:
  postgres:
    image: postgres:18.4
    container_name: minecraft-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: minecraft
      POSTGRES_USER: minecraft
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-minecraft-dev}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minecraft -d minecraft"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
